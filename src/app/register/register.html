<div class="login-container" style="margin-top: auto; margin-bottom: auto;">
    <mat-card class="login-card">
        <div style="width: 100%; text-align: center;">
            <h2>Register</h2>
            <h3>Create an Account</h3>
        </div>
        <mat-card-actions>
            <form style="width: 100%;" [formGroup]="form" (ngSubmit)="emailRegister()">
                <mat-form-field appearance="outline" style="width: 100%;">
                    <mat-label>E-mail</mat-label>
                    <input matInput formControlName="email" autocomplete="off">
                </mat-form-field>
                <p></p>
                <mat-form-field appearance="outline" style="width: 100%;">
                    <mat-label>Password</mat-label>
                    <input matInput [type]="hide ? 'password' : 'text'" formControlName="password" type="password"
                        autocomplete="off">
                    <button type="button" mat-icon-button matSuffix (click)="hide = !hide" [attr.aria-pressed]="!hide" style="margin-right: 5px;">
                        <mat-icon>{{ hide ? 'visibility_off' : 'visibility' }}</mat-icon>
                    </button>
                </mat-form-field>
                <mat-form-field appearance="outline" style="width: 100%;">
                    <mat-label>Confirm Password</mat-label>
                    <input matInput [type]="hide ? 'password' : 'text'" formControlName="confirmPassword" type="password"
                        autocomplete="off">
                </mat-form-field>
                <p></p>
                <button type="submit" class="primary-button" style="width: 100%;" [disabled]="form.invalid || loading"
                    mat-raised-button>Register</button>
                <button type="button" class="primary-button" style="width: 100%; margin-top: 1vh;" (click)="guestLogin()"
                    mat-raised-button>Return to Home</button>
            </form>
        </mat-card-actions>
    </mat-card>
</div>
